server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        # Sans "try_files", nginx cherche un fichier correspondant à l'URL.
        # Ex: /items/42 → nginx cherche /usr/share/nginx/html/items/42 → 404
        #
        # Avec Vue Router en mode "history" (URLs sans #), toutes les routes
        # sont gérées par index.html côté client. On doit donc renvoyer
        # index.html pour toute URL inconnue et laisser Vue Router faire le routing.
        try_files $uri $uri/ /index.html;
    }
}
